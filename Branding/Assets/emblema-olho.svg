<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="OpenSight — emblema do olho-reator">
  <title>OpenSight — Emblema (olho-reator)</title>

  <defs>
    <linearGradient id="seal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15181E"/><stop offset="1" stop-color="#0A0B0D"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#363B45"/><stop offset="1" stop-color="#171A20"/>
    </linearGradient>
    <radialGradient id="iris" cx="0.42" cy="0.38" r="0.78">
      <stop offset="0" stop-color="#FF8A78"/>
      <stop offset="0.30" stop-color="#F03A24"/>
      <stop offset="0.68" stop-color="#C1121F"/>
      <stop offset="1" stop-color="#6A040F"/>
    </radialGradient>
    <filter id="bigGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== SELO HEXAGONAL ===== -->
  <polygon points="128,10 230.2,69 230.2,187 128,246 25.8,187 25.8,69"
           fill="url(#seal)" stroke="#C8962C" stroke-width="3.2" stroke-linejoin="round"/>
  <polygon points="128,27 215.5,77.5 215.5,178.5 128,229 40.5,178.5 40.5,77.5"
           fill="none" stroke="#2C3038" stroke-width="1.3"/>

  <!-- ===== PÁLPEBRAS / SOCKET (facetas metálicas) ===== -->
  <!-- sobrancelha superior (cenho de predador) -->
  <polygon points="50,98 128,68 206,98 206,86 128,56 50,86"
           fill="url(#lid)" stroke="#4B515C" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- pálpebra inferior -->
  <polygon points="58,162 128,190 198,162 198,174 128,202 58,174"
           fill="url(#lid)" stroke="#4B515C" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- ===== ABERTURA DO OLHO (almêndoa) ===== -->
  <polygon points="52,128 88,98 128,86 168,98 204,128 168,158 128,170 88,158"
           fill="#0B0D11" stroke="#C8962C" stroke-width="2" stroke-linejoin="round"/>

  <!-- ===== ÍRIS-REATOR (grande) ===== -->
  <g filter="url(#bigGlow)">
    <circle cx="128" cy="128" r="42" fill="none" stroke="#C8962C" stroke-width="2.4"/>
    <circle cx="128" cy="128" r="40" fill="url(#iris)"/>
    <circle cx="128" cy="128" r="32" fill="none" stroke="#FF8A78" stroke-width="1.2" opacity="0.30"/>
    <circle cx="128" cy="128" r="24" fill="none" stroke="#6A040F" stroke-width="1.4" opacity="0.55"/>
    <!-- pupila -->
    <circle cx="128" cy="128" r="16" fill="#180407"/>
    <circle cx="128" cy="128" r="15" fill="none" stroke="#F03A24" stroke-width="1" opacity="0.6"/>
    <!-- núcleo aceso -->
    <circle cx="128" cy="128" r="6" fill="#FF8A78"/>
    <circle cx="128" cy="128" r="2.6" fill="#FFE3D6"/>
    <!-- reflexo especular -->
    <circle cx="118" cy="118" r="3" fill="#FFE3D6" opacity="0.85"/>
  </g>

  <!-- ===== MARCAS DE SENSOR (12 ticks ao redor da íris) ===== -->
  <g stroke="#C8962C" stroke-width="1.4" opacity="0.8">
    <line x1="128" y1="85" x2="128" y2="80"/>
    <line x1="128" y1="85" x2="128" y2="80" transform="rotate(30 128 128)"/>
    <line x1="128" y1="85" x2="128" y2="80" transform="rotate(60 128 128)"/>
    <line x1="128" y1="85" x2="128" y2="80" transform="rotate(90 128 128)"/>
    <line x1="128" y1="85" x2="128" y2="80" transform="rotate(120 128 128)"/>
    <line x1="128" y1="85" x2="128" y2="80" transform="rotate(150 128 128)"/>
    <line x1="128" y1="85" x2="128" y2="80" transform="rotate(180 128 128)"/>
    <line x1="128" y1="85" x2="128" y2="80" transform="rotate(210 128 128)"/>
    <line x1="128" y1="85" x2="128" y2="80" transform="rotate(240 128 128)"/>
    <line x1="128" y1="85" x2="128" y2="80" transform="rotate(270 128 128)"/>
    <line x1="128" y1="85" x2="128" y2="80" transform="rotate(300 128 128)"/>
    <line x1="128" y1="85" x2="128" y2="80" transform="rotate(330 128 128)"/>
  </g>
</svg>
